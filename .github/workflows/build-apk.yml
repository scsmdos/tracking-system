name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Set NODE_ENV
        run: echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Prebuild Expo Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          # Generate a temporary keystore
          keytool -genkey -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=TMS, OU=TMS, O=TMS, L=TMS, S=TMS, C=US" -storepass password -keypass password
          
          # Find apksigner
          export BUILD_TOOLS_DIR=$ANDROID_HOME/build-tools
          export LATEST_BUILD_TOOLS=$(ls -1d $BUILD_TOOLS_DIR/* | sort -V | tail -n 1)
          export APKSIGNER=$LATEST_BUILD_TOOLS/apksigner
          
          # Sign the unsigned release APK
          $APKSIGNER sign --ks my-release-key.keystore --ks-pass pass:password --ks-key-alias my-key-alias --key-pass pass:password --out android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Signed Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
